<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Your Course Landing Page</h1>

<form action="/tst">
    
    <label for="title">Course Title</label>
    <input type="text" id="title" name="title">   
    <div><label for="course">Course Description</label></div>
    <div><textarea rows="10" cols="35" id="course" name="desc"></textarea></div>  

    <label for="skill">Skill Level</label>
    <select name="skill" id="skill">
     <option value="1">Beginner</option>
     <option value="2">Medium</option>
     <option value="3">Profi</option>
    </select>   

    <div><label for="publish">Ready to publish the course?</label>
    <input type="checkbox" checked id="publish" name="box"></div>
    <div><button>Submit</button></div>

 </form> 

</body>
</html>
