<body>

    <h1>Checkout</h1>

    <form action="">

        <fieldset>

            <legend>Shipping Method</legend>
            <div>
            <input type="radio" id="two" name="shipping">
            <label for="two">FREE - Two Day Shipping</label>            
            </div>

            <div>
            <input type="radio" id="standard" name="shipping">
            <label for="standard">FREE - Standard Shipping (4-5 Business Days)</label>            
            </div>

            <div>
            <input type="radio" id="no_rush" name="shipping">
            <label for="no_rush">FREE - No Rush Shipping (5 Business Days)</label>
            
            </div>

        </fieldset>

        <label for="gift">This is a gift</label>
        <input type="checkbox" name="0" >
        <div>
        <button>Place Your Order</button>
        </div>

    </form>
